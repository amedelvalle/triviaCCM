<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Trivia Salud Cardiovascular</title>
    <style>
        :root { --primary: #e63946; --bg: #f8f9fa; --text: #1d3557; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg); color: var(--text);
            display: flex; align-items: center; justify-content: center;
            height: 100vh; margin: 0; overflow: hidden;
        }
        .card {
            width: 90%; max-width: 400px; background: white;
            padding: 30px; border-radius: 24px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center;
        }
        h2 { margin-bottom: 10px; font-size: 1.4rem; color: var(--primary); }
        p { font-size: 0.9rem; color: #666; margin-bottom: 25px; }
        
        .input-group { margin-bottom: 20px; }
        input {
            width: 100%; padding: 15px; font-size: 1.2rem;
            border: 2px solid #ddd; border-radius: 12px;
            text-transform: uppercase; text-align: center;
            box-sizing: border-box; outline: none; transition: 0.3s;
        }
        input:focus { border-color: var(--primary); box-shadow: 0 0 8px rgba(230, 57, 70, 0.2); }
        
        button {
            width: 100%; padding: 15px; font-size: 1.1rem; font-weight: bold;
            background-color: var(--primary); color: white;
            border: none; border-radius: 12px; cursor: pointer;
            transition: transform 0.1s, background 0.3s;
        }
        button:active { transform: scale(0.98); background-color: #c12e3a; }
        
        #result { 
            margin-top: 20px; min-height: 50px; 
            font-size: 1.1rem; font-weight: 600; line-height: 1.4;
        }
        .success { color: #2a9d8f; animation: pop 0.3s ease; }
        .error { color: #e63946; }
        
        @keyframes pop {
            0% { transform: scale(0.8); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

<div class="card">
    <h2>❤️ Trivia Médica</h2>
    <p>¿Lograste descifrar la palabra de 11 letras? <br>Escríbela aquí debajo:</p>
    
    <div class="input-group">
        <input type="text" id="answer" placeholder="TU RESPUESTA..." autocomplete="off">
    </div>
    
    <button onclick="check()">VERIFICAR</button>
    
    <div id="result"></div>
</div>

<script>
    function check() {
        const secret = "TAQUICARDIA";
        const val = document.getElementById("answer").value.trim().toUpperCase();
        const res = document.getElementById("result");
        
        if (val === "") {
            res.innerHTML = "⚠️ Escribe algo primero";
            res.className = "error";
            return;
        }

        if (val === secret) {
            res.innerHTML = "🎉 ¡EXCELENTE!<br>Cuidar tu ritmo es cuidar tu vida.";
            res.className = "success";
            document.getElementById("answer").style.borderColor = "#2a9d8f";
        } else {
            res.innerHTML = "❌ Casi... ¡Vuelve a contar los espacios en la imagen!";
            res.className = "error";
            document.body.style.animation = "shake 0.2s ease-in-out"; 
        }
    }
</script>

</body>
</html>
